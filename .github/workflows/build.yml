name: build

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/ashbuk/dev-activity

# GITHUB_TOKEN needs packages:write to push to ghcr.io.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v7

      - name: Build
        run: go build ./...

      # Checks dependencies against the Go vulnerability database,
      # reporting only vulnerabilities in code paths we actually call.
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sortable tag timestamp
        id: ts
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest for humans, :sha for traceability,
          # :main-<ts>-<sha> is sortable — Flux image automation orders by it.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:main-${{ steps.ts.outputs.ts }}-${{ github.sha }}
